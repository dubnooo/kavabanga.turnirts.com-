<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPortal | Твій Світ Геймінгу</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Geming<span>Tourmament</span></div>
            <ul>
                <li><a href="#">Новини</a></li>
                <li><a href="https://dubnooo.github.io/kavabanga.cs2.com/">Огляди</a></li>
                <li><a href="http://dubnooo.github.io/kavababga.dota.com/">Турніри</a></li>
                <li><a href="#" class="btn-join">Приєднатись</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1> весело такруто участвувати в гейменгу</h1>
            <p>будь у курсі всіх турнірів</p>
        </section>

        <section class="games-grid">
            <div class="card">
                <div class="badge">Hot</div>
                <h3>Cyberpunk 2077</h3>
                <p>Останні оновлення та DLC</p>
            </div>
            <div class="card">
                <div class="badge">New</div>
                <h3>Elden Ring</h3>
                <p>Гайд по проходженню босів</p>
            </div>
            <div class="card">
                <div class="badge">E-sports</div>
                <h3>Dota 2 / CS2</h3>
                <p>Аналітика великих турнірів</p>
            </div>
        </section>
    </main>
</body>
</html>
